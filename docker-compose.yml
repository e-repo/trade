services:
    postgres:
        container_name: t-postgres
        image: postgres:18-alpine
        volumes:
            - vol-postgres:/var/lib/postgresql/data
            - ./docker/development/create-test-database.sh:/docker-entrypoint-initdb.d/create-test-database.sh
        environment:
            POSTGRES_USER: app
            POSTGRES_PASSWORD_FILE: /run/secrets/db_password
            POSTGRES_DB: app
            POSTGRES_TEST_DB: test
        ports:
            - "54321:5432"
        secrets:
            - db_password

    php-fpm:
        container_name: t-php-fpm
        build:
            context: ./docker/development/fpm
        environment:
            PHP_IDE_CONFIG: "serverName=bb.local"
        volumes:
            - ./:/app
        depends_on:
            - postgres

    php-cli:
        container_name: t-php-cli
        build:
            context: ./docker/development/cli
        environment:
            PHP_IDE_CONFIG: "serverName=bb.local"
        volumes:
            - ./:/app
            - vol-composer:/root/.composer/cache
        depends_on:
            - postgres

    nginx:
        container_name: t-nginx
        build:
            context: ./docker/development/nginx
        volumes:
            - ./:/app
        ports:
            - "8088:80"
        depends_on:
            - php-fpm

    mailer:
        container_name: t-mailer
        image: mailhog/mailhog
        ports:
            - "8025:8025"
            - "1025:1025"

secrets:
    db_password:
        file: ./docker/development/secrets/db_password

volumes:
    vol-postgres:
    vol-composer: